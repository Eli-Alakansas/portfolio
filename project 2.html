<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Title One - Deyan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <a href="Landing page.html" class="logo">Deyan.</a>
      <nav>
        <a href="Landing page.html">Home</a>
        <a href="Landing page.html">About</a>
        <a href="Landing page.html">Portfolio</a>
        <a href="Landing page.html">Contact</a>
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
      </nav>
    </header>

    <div class="project-header">
      <h1>Videos I made</h1>
      <p>
        Some color coding and assembly work I've done mostly in premiere pro.
      </p>
      <a href="Landing page.html" class="back-btn">&larr; Back to Portfolio</a>
    </div>

    <div class="image-gallery">
      <video src="images/Video2.mp4" class="gallery-img" controls></video>

      <video
        src="images/video3.mp4"
        class="gallery-img"
        autoplay
        loop
        muted
        playsinline
      ></video>

      <video src="images/video4.mp4" class="gallery-img" controls></video>

      <video src="images/video5.mp4" class="gallery-img" controls></video>
    </div>
    <script>
      const toggleBtn = document.getElementById("theme-toggle");
      const body = document.body;

      const currentTheme = localStorage.getItem("theme");
      if (currentTheme === "dark") {
        body.classList.add("dark-mode");
        toggleBtn.innerText = "☀️ Light Mode";
      }

      toggleBtn.addEventListener("click", () => {
        body.classList.toggle("dark-mode");
        if (body.classList.contains("dark-mode")) {
          toggleBtn.innerText = "☀️ Light Mode";
          localStorage.setItem("theme", "dark");
        } else {
          toggleBtn.innerText = "🌙 Dark Mode";
          localStorage.setItem("theme", "light");
        }
      });
    </script>
  </body>
</html>
