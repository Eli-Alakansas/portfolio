<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Title One - Deyan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">Deyan.</a>
      <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#portfolio">Portfolio</a>
        <a href="index.html#contact">Contact</a>
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
      </nav>
    </header>

    <div class="project-header">
      <h1>Graphics design</h1>
      <p>Some of my logo work and 2d art with other collaborators.</p>
      <a href="index.html" class="back-btn">&larr; Back to Portfolio</a>
    </div>

    <div class="image-gallery">
      <img
        src="images/graphics1.png"
        alt="Gallery Image 1"
        class="gallery-img"
      />
      <img
        src="images/graphics2.jpg"
        alt="Gallery Image 2"
        class="gallery-img"
      />
      <img
        src="images/graphics3.png"
        alt="Gallery Image 3"
        class="gallery-img"
      />
      <img
        src="images/graphics4.png"
        alt="Gallery Image 4"
        class="gallery-img"
      />
    </div>
    <script>
      const toggleBtn = document.getElementById("theme-toggle");
      const body = document.body;

      const currentTheme = localStorage.getItem("theme");
      if (currentTheme === "dark") {
        body.classList.add("dark-mode");
        toggleBtn.innerText = "☀️ Light Mode";
      }

      toggleBtn.addEventListener("click", () => {
        body.classList.toggle("dark-mode");

        if (body.classList.contains("dark-mode")) {
          toggleBtn.innerText = "☀️ Light Mode";
          localStorage.setItem("theme", "dark");
        } else {
          toggleBtn.innerText = "🌙 Dark Mode";
          localStorage.setItem("theme", "light");
        }
      });
    </script>
  </body>
</html>
